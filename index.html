<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mood Aquarium</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0b1d2a;
        font-family: sans-serif;
    }

    #aquarium {
        width: 100vw;
        height: 100vh;
    }

    .fish {
        cursor: pointer;
        transition: transform 0.2s;
    }

    .label {
        font-size: 10px;
        fill: white;
        text-anchor: middle;
        pointer-events: none;
    }
</style>
</head>
<body>

<svg id="aquarium"></svg>
<audio id="player"></audio>

<script>
const songs = [
    { title: "Sunny Day", valence: 0.9, energy: 0.8, tempo: 140, color: "#ffd166", preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { title: "Calm Waves", valence: 0.6, energy: 0.3, tempo: 80, color: "#4cc9f0", preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { title: "Sad Echo", valence: 0.2, energy: 0.2, tempo: 60, color: "#4361ee", preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    { title: "Fire Rush", valence: 0.4, energy: 1.0, tempo: 170, color: "#ef476f", preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" },
    { title: "Dream Float", valence: 0.7, energy: 0.5, tempo: 100, color: "#a8dadc", preview: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3" }
];

const svg = document.getElementById("aquarium");
const audio = document.getElementById("player");

let W = window.innerWidth;
let H = window.innerHeight;
let previewTimeout = null;

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    svg.setAttribute("width", W);
    svg.setAttribute("height", H);
}

resize();
window.addEventListener("resize", resize);

const fishes = [];

function createFish(song) {
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "fish");

    const x = Math.random() * W;
    const y = Math.random() * H;
    const speed = 0.5 + song.energy * 3;

    const fish = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
    fish.setAttribute("cx", 0);
    fish.setAttribute("cy", 0);
    fish.setAttribute("rx", 20 + song.energy * 20);
    fish.setAttribute("ry", 10 + song.valence * 10);
    fish.setAttribute("fill", song.color);

    const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
    label.setAttribute("class", "label");
    label.setAttribute("x", 0);
    label.setAttribute("y", 30);
    label.textContent = song.title;

    g.setAttribute("transform", `translate(${x},${y})`);
    g.appendChild(fish);
    g.appendChild(label);
    svg.appendChild(g);

    const state = {
        x,
        y,
        vx: (Math.random() - 0.5) * speed,
        vy: (Math.random() - 0.5) * speed,
        speed,
        song,
        el: g
    };

    g.addEventListener("click", () => {
        if (previewTimeout) {
            clearTimeout(previewTimeout);
            previewTimeout = null;
        }

        audio.src = song.preview;
        audio.currentTime = 0;
        audio.play().catch(() => {
            // ignore playback errors from autoplay restrictions
        });

        previewTimeout = setTimeout(() => {
            audio.pause();
            previewTimeout = null;
        }, 10000);
    });

    fishes.push(state);
}

songs.forEach(createFish);

function animate() {
    fishes.forEach(f => {
        f.x += f.vx;
        f.y += f.vy;

        // bounce walls
        if (f.x < 0) {
            f.x = 0;
            f.vx *= -1;
        }
        if (f.x > W) {
            f.x = W;
            f.vx *= -1;
        }
        if (f.y < 0) {
            f.y = 0;
            f.vy *= -1;
        }
        if (f.y > H) {
            f.y = H;
            f.vy *= -1;
        }

        // slight random drift
        f.vx += (Math.random() - 0.5) * 0.1 * f.song.energy;
        f.vy += (Math.random() - 0.5) * 0.1 * f.song.energy;

        // clamp speed
        const max = f.speed;
        f.vx = Math.max(-max, Math.min(max, f.vx));
        f.vy = Math.max(-max, Math.min(max, f.vy));

        f.el.setAttribute("transform", `translate(${f.x},${f.y})`);
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
