<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mood Aquarium</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div id="loading">

<div class="spinner"></div>

<h1>Mood Aquarium</h1>

<p>Loading your ocean...</p>

</div>

<header>

<h1>Mood Aquarium</h1>

<div class="controls">

<input
id="search"
placeholder="Search songs...">

<select id="genre">

<option value="all">All Genres</option>

</select>

</div>

</header>

<div id="infoPanel" class="hidden">

<div id="close">✕</div>

<h2 id="songTitle"></h2>

<p id="songGenre"></p>

<div class="stats">

<div>

<span>Mood</span>

<div class="bar">

<div id="moodBar"></div>

</div>

</div>

<div>

<span>Energy</span>

<div class="bar">

<div id="energyBar"></div>

</div>

</div>

<div>

<span>Tempo</span>

<div class="bar">

<div id="tempoBar"></div>

</div>

</div>

</div>

<button id="playPreview">

▶ Play Preview

</button>

</div>

<svg id="aquarium">

<defs>

<linearGradient
id="water"
x1="0"
y1="0"
x2="0"
y2="1">

<stop offset="0%" stop-color="#0d3b66"/>

<stop offset="100%" stop-color="#061826"/>

</linearGradient>

</defs>

<rect
width="100%"
height="100%"
fill="url(#water)"/>

</svg>

<audio id="audio"></audio>

<script src="particles.js"></script>
<script src="boids.js"></script>
<script src="fish.js"></script>
<script src="ui.js"></script>
<script src="script.js"></script>

</body>
</html>
